<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – PELISAN Sit-In</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">PELISAN Sit-In Monitoring System</a>
    <ul class="navbar-nav">
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
  </nav>

  <div class="login-body">
    <div class="login-container">

      <!-- LEFT: Logo -->
      <div class="login-visual">
        <div class="login-visual-ring"></div>
        <div class="login-visual-ring2"></div>
        <img src="images/ccslogo.png" alt="CCS Logo" class="login-logo-img"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="login-logo-fallback" style="display:none;">
          <span class="big">CCS</span>
          <span class="small">Computer Studies</span>
        </div>
      </div>

      <!-- RIGHT: Login Form -->
      <div class="login-form-side">
        <div class="login-title">Welcome back</div>
        <div class="login-subtitle">Sign in to PELISAN Sit-In Monitoring</div>

        <div id="login-alert" class="alert"></div>

        <div class="field-group">
          <label class="field-label">ID Number</label>
          <input type="text" id="idNumber" class="field-input" placeholder="Enter your ID number">
        </div>

        <div class="field-group">
          <label class="field-label">Password</label>
          <input type="password" id="password" class="field-input" placeholder="Enter your password">
        </div>

        <button class="btn-login" onclick="handleLogin()">Sign In →</button>

        <div class="register-link-row">
          Don't have an account? <a href="register.html">Register here</a>
        </div>
      </div>

    </div>
  </div>

  <footer class="footer">© 2024 PELISAN Sit-In · College of Computer Studies</footer>

  <script src="js/app.js"></script>
  <script>
    // Redirect if already logged in
    Auth.current().then(user => {
      if (user) {
        window.location.href = user.role === 'admin' ? 'pages/admin-dashboard.html' : 'pages/student-dashboard.html';
      }
    });

    async function handleLogin() {
      const id = document.getElementById('idNumber').value.trim();
      const pw = document.getElementById('password').value;
      if (!id || !pw) { showAlert('login-alert', 'Please enter your ID number and password.'); return; }

      const btn = document.querySelector('.btn-login');
      btn.textContent = 'Signing in...';
      btn.disabled = true;

      const result = await Auth.login(id, pw);
      btn.textContent = 'Sign In →';
      btn.disabled = false;

      if (result.error) { showAlert('login-alert', result.error); return; }
      window.location.href = result.user.role === 'admin' ? 'pages/admin-dashboard.html' : 'pages/student-dashboard.html';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
